# Example configuration for go-rss-update-handler.
# Secrets are supplied via environment variables:
#   GRUH_DB_DSN        — database connection string (storage.dsn)
#   GRUH_LLM_API_KEY   — LLM API key (llm.api_key)

storage:
  driver: postgres
  raw_content_retention: 90d   # raw_contents cleanup period; 0/empty = keep forever

llm:
  base_url: https://vllm.internal:8000/v1
  model: qwen3-32b
  # tls:
  #   insecure: true   # skip cert verification for self-signed/local endpoints only

observability:
  log:
    level: info
    format: json
  metrics: ":9090"   # address for the /metrics + /healthz + /readyz server ("" disables it)
