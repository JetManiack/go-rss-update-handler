<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gruh · updates</title>
<link rel="icon" type="image/png" href="/go-ruh.png">
<link rel="alternate" type="application/atom+xml" title="go-rss-update-handler" href="/feed.atom">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: #0e1116; color: #d7dae0;
  }
  header {
    position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    padding: .6rem 1rem; background: #151a21ee; backdrop-filter: blur(6px);
    border-bottom: 1px solid #262d38;
  }
  header .logo { width: 22px; height: 22px; border-radius: 5px; display: block; }
  header h1 { margin: 0; font-size: 15px; font-weight: 600; color: #fff; }
  header .spacer { flex: 1; }
  header label { color: #8b93a1; font-size: 12px; }
  header select {
    background: #0e1116; color: #d7dae0; border: 1px solid #262d38; border-radius: 6px;
    padding: .18rem .35rem; font: inherit; font-size: 12px;
  }
  header button {
    background: #1b222c; color: #d7dae0; border: 1px solid #262d38; border-radius: 6px;
    padding: .12rem .55rem; cursor: pointer; font: inherit;
  }
  header button:disabled { opacity: .4; cursor: default; }
  header .meta { color: #8b93a1; font-size: 12px; white-space: nowrap; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; display: inline-block; margin-right: .35rem; }

  main { max-width: 1100px; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; gap: .75rem; }

  .card { background: #151a21; border: 1px solid #262d38; border-radius: 8px; overflow: hidden; }
  .card.imp { border-left: 3px solid #3fb950; }
  .card.noise { border-left: 3px solid #3a4250; }
  .card.pend { border-left: 3px solid #e3b341; }

  .head { display: flex; align-items: center; gap: .6rem; padding: .55rem .8rem; border-bottom: 1px solid #1e2530; flex-wrap: wrap; }
  .head .spacer { flex: 1; }
  .head time { color: #8b93a1; font-size: 12px; white-space: nowrap; }

  .badge { padding: .08rem .5rem; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: .02em; }
  .badge.imp { background: #26311f; color: #7ee787; }
  .badge.noise { background: #2a2f38; color: #9aa4b2; }
  .badge.pend { background: #33290f; color: #e3b341; }
  .cat { color: #d2a8ff; }
  .conf { color: #8b93a1; }
  .conf::before { content: "confidence "; color: #5b6472; }

  .src { display: block; padding: .5rem .8rem 0; color: #6cb6ff; text-decoration: none; word-break: break-word; font-size: 14px; font-weight: 600; }
  .src:hover { text-decoration: underline; }
  .reason { padding: .35rem .8rem .1rem; color: #adb4c0; }
  .reason::before { content: "reason: "; color: #5b6472; }

  .release {
    margin: .55rem .8rem .8rem; padding: .65rem .85rem; background: #0a0d12; border: 1px solid #1e2530;
    border-radius: 6px; max-height: 26rem; overflow: auto; color: #c3c9d3; font-size: 13px;
    word-break: break-word;
  }
  .release > :first-child { margin-top: 0; }
  .release > :last-child { margin-bottom: 0; }
  .release p, .release ul, .release ol, .release blockquote, .release pre, .release table,
  .release h1, .release h2, .release h3, .release h4 { margin: .5rem 0; }
  .release a { color: #6cb6ff; }
  .release ul, .release ol { padding-left: 1.4rem; }
  .release h1, .release h2, .release h3, .release h4 { font-size: 1.02em; font-weight: 600; color: #e6e9ee; }
  .release code { background: #161b22; padding: .05rem .3rem; border-radius: 4px; font-size: .92em; }
  .release pre { background: #161b22; padding: .6rem .75rem; border-radius: 6px; overflow: auto; }
  .release pre code { background: none; padding: 0; }
  .release img { max-width: 100%; height: auto; border-radius: 4px; }
  .release blockquote { border-left: 3px solid #2b3340; margin-left: 0; padding-left: .8rem; color: #9aa4b2; }
  .release hr { border: none; border-top: 1px solid #1e2530; }
  .release table { border-collapse: collapse; }
  .release th, .release td { border: 1px solid #1e2530; padding: .2rem .5rem; }
  .release.empty { color: #5b6472; font-style: italic; border-style: dashed; }

  .empty-state { padding: 3rem 1rem; text-align: center; color: #8b93a1; }
</style>
</head>
<body>
<header>
  <img class="logo" src="/go-ruh.png" alt="">
  <h1>gruh · updates</h1>
  <label>category
    <select id="f-category">
      <option value="">all</option>
      <option value="security">security</option>
      <option value="breaking">breaking</option>
      <option value="feature">feature</option>
      <option value="fix">fix</option>
      <option value="noise">noise</option>
      <option value="unclassified">unclassified</option>
    </select>
  </label>
  <label>importance
    <select id="f-importance">
      <option value="">all</option>
      <option value="important">important</option>
      <option value="noise">noise</option>
      <option value="pending">pending</option>
    </select>
  </label>
  <span class="spacer"></span>
  <a class="feed" href="/feed.atom" title="Subscribe · Atom feed">⤳ Atom</a>
  <button id="prev" title="previous page">‹</button>
  <span id="pager" class="meta">—</span>
  <button id="next" title="next page">›</button>
  <span class="meta"><span class="dot" id="dot"></span><span id="status">connecting…</span></span>
</header>
<main id="cards"></main>
<div class="empty-state" id="empty" hidden>No updates match.</div>

<script>
const container = document.getElementById('cards');
const emptyEl = document.getElementById('empty');
const statusEl = document.getElementById('status');
const dotEl = document.getElementById('dot');
const pagerEl = document.getElementById('pager');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const catSel = document.getElementById('f-category');
const impSel = document.getElementById('f-importance');

const cards = new Map(); // id -> { el, sig }
const pageSize = 50;
const state = { offset: 0, category: '', importance: '' };

function esc(s) {
  return (s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtTime(t) {
  if (!t) return '';
  const d = new Date(t);
  return isNaN(d) ? '' : d.toISOString().replace('T', ' ').slice(0, 16);
}
function midTrunc(s, max) {
  s = s || '';
  if (s.length <= max) return s;
  const keep = max - 1, head = Math.ceil(keep / 2), tail = Math.floor(keep / 2);
  return s.slice(0, head) + '…' + s.slice(s.length - tail);
}
function stateOf(u) {
  if (u.classified_at == null) return 'pend';
  return u.important ? 'imp' : 'noise';
}
function sigOf(u) {
  return [stateOf(u), u.title, u.category, u.confidence, (u.content || '').length].join('|');
}

function fill(el, u) {
  const st = stateOf(u);
  el.className = 'card ' + st;
  const badge = '<span class="badge ' + st + '">' + (st === 'imp' ? 'important' : st === 'noise' ? 'noise' : 'pending') + '</span>';
  const cat = u.category ? '<span class="cat">' + esc(u.category) + '</span>' : '';
  const conf = (u.classified_at != null && typeof u.confidence === 'number') ? '<span class="conf">' + Math.round(u.confidence * 100) + '%</span>' : '';
  const label = (u.title && u.title.trim()) ? u.title.trim() : midTrunc(u.source_url, 72);
  const reason = u.reason ? '<div class="reason">' + esc(u.reason) + '</div>' : '';
  const release = u.content
    ? '<div class="release">' + u.content + '</div>' // server-sanitized HTML (bluemonday)
    : '<div class="release empty">no release text</div>';
  el.innerHTML =
    '<div class="head">' + badge + cat + conf +
      '<span class="spacer"></span><time>' + esc(fmtTime(u.published_at)) + ' UTC</time></div>' +
    '<a class="src" href="' + esc(u.source_url) + '" title="' + esc(u.source_url) + '" target="_blank" rel="noopener">' + esc(label) + '</a>' +
    reason + release;
}

function render(items) {
  emptyEl.hidden = items.length !== 0;
  const seen = new Set();
  for (const u of items) {
    seen.add(u.id);
    let rec = cards.get(u.id);
    const sig = sigOf(u);
    if (!rec) {
      const el = document.createElement('article');
      fill(el, u);
      rec = { el, sig };
      cards.set(u.id, rec);
    } else if (rec.sig !== sig) {
      fill(rec.el, u);
      rec.sig = sig;
    }
    container.appendChild(rec.el); // keep data order without disturbing untouched cards
  }
  for (const [id, rec] of cards) {
    if (!seen.has(id)) { rec.el.remove(); cards.delete(id); }
  }
}

function updatePager(total) {
  const start = total === 0 ? 0 : state.offset + 1;
  const end = Math.min(state.offset + pageSize, total);
  pagerEl.textContent = start + '–' + end + ' of ' + total;
  prevBtn.disabled = state.offset <= 0;
  nextBtn.disabled = state.offset + pageSize >= total;
}

function buildURL() {
  const p = new URLSearchParams({ limit: String(pageSize), offset: String(state.offset) });
  if (state.category) p.set('category', state.category);
  if (state.importance) p.set('importance', state.importance);
  return '/api/updates?' + p.toString();
}

function resetView() {
  cards.clear();
  container.innerHTML = '';
}

async function refresh() {
  try {
    const res = await fetch(buildURL(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data.items || []);
    updatePager(data.total || 0);
    dotEl.style.background = '#3fb950';
    statusEl.textContent = (data.total || 0) + ' total · ' + new Date().toLocaleTimeString();
  } catch (e) {
    dotEl.style.background = '#f85149';
    statusEl.textContent = 'error: ' + e.message;
  }
}

catSel.addEventListener('change', () => { state.category = catSel.value; state.offset = 0; resetView(); refresh(); });
impSel.addEventListener('change', () => { state.importance = impSel.value; state.offset = 0; resetView(); refresh(); });
prevBtn.addEventListener('click', () => { if (state.offset > 0) { state.offset = Math.max(0, state.offset - pageSize); resetView(); refresh(); } });
nextBtn.addEventListener('click', () => { state.offset += pageSize; resetView(); refresh(); });

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
